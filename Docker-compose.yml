# Mismo archivo que docker-compose.yml (compatibilidad Windows)
# Preferir: docker compose -f Docker-compose.yml up --build
# La base de datos vive en Supabase (ver .env). No se usa Postgres local.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fairbet_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_sistema &&
             python manage.py seed_eventos &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
