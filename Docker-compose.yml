  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fairbet_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_sistema &&
             python manage.py seed_eventos &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    #depends_on:
      #db:
        #condition: service_healthy

  redis:
    image: redis:7.4-alpine  # O la versión que esté usando tu equipo
    container_name: fairbet_redis
    ports:
      - "6379:6379"
    # 💡 Esto evita que Redis limpie los hilos pasivos que Daphne deja abiertos
    command: redis-server --timeout 0 --tcp-keepalive 60
    networks:
      - default

