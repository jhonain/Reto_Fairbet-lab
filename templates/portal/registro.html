{% extends "base.html" %}
{% block title %}Registro - FairBet Lab{% endblock %}
{% block content %}
<h1>Registro + KYC</h1>
<form method="post" class="formulario">
    {% csrf_token %}
    <label>Usuario <input type="text" name="username" required></label>
    <label>Contrasena <input type="password" name="password" required></label>
    <label>DNI (8 digitos) <input type="text" name="dni" inputmode="numeric" maxlength="8" pattern="[0-9]{8}" title="El DNI debe tener 8 digitos numericos" required></label>
    <label>Fecha de nacimiento <input type="date" name="fecha_nacimiento" required></label>
    <button type="submit" class="btn">Registrarme</button>
</form>
{% endblock %}
